name: Auto Vote

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  vote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps
      - name: Vote
        run: python vote_rfbanana.py
